<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<title>Gabung Grup WhatsApp</title>

<style>

body{
    margin:0;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
}

.card{
    background:#fff;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
    text-align:center;
    width:350px;
}

.loader{
    width:45px;
    height:45px;
    border:5px solid #ddd;
    border-top:5px solid #25D366;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:20px auto;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="card">

<h2>Gabung Grup WhatsApp</h2>

<p id="status">
Sedang mencari grup yang tersedia...
</p>

<div class="loader"></div>

</div>

<script src="script.js"></script>

</body>
</html>
